services:
  openclatura:
    build:
      context: ..
      dockerfile: Dockerfile
    image: openclatura:local
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
