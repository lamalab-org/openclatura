<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenClatura — SMILES to IUPAC, explained</title>
  <style>
    :root { color-scheme:dark; --ink:#eeeae0; --muted:#98a6ad; --line:rgba(238,234,224,.14); --lime:#f4d345; --cyan:#58c4dd; --violet:#9a72ac; --orange:#ff862f; --danger:#fc6255; --stage-color:var(--lime) }
    *{box-sizing:border-box} html,body{width:100%;min-height:100%;margin:0} body{overflow:hidden;font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:#0b0f14}
    body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.08;background-image:radial-gradient(rgba(238,234,224,.6) .7px,transparent .7px);background-size:28px 28px}
    button,input,select{font:inherit}button{color:inherit}.app{width:min(1600px,100%);height:100vh;min-height:650px;display:grid;grid-template-rows:auto 1fr auto;padding:28px 46px 22px;gap:0;margin:auto}header{display:flex;align-items:center;justify-content:space-between;gap:24px;position:relative;z-index:5;padding-bottom:18px;border-bottom:1px solid var(--line)}
    .brand{display:flex;align-items:baseline;gap:16px}.brand strong{font:500 23px/1.1 Georgia,"Times New Roman",serif;letter-spacing:.01em}.brand strong:before{content:"[";color:var(--lime);margin-right:4px}.brand strong:after{content:"]";color:var(--lime);margin-left:4px}.brand small{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.19em}
    .input-bar{display:flex;align-items:center;gap:10px;min-width:min(640px,58vw)}.smiles-wrap{flex:1;display:flex;align-items:center;border:1px solid var(--line);background:transparent;border-radius:4px;padding:4px 5px 4px 14px;transition:border .2s}.smiles-wrap:focus-within{border-color:rgba(244,211,69,.6)}.smiles-wrap label{color:var(--lime);font:600 9px/1 ui-monospace,monospace;letter-spacing:.15em;margin-right:12px}#smiles{min-width:0;flex:1;color:var(--ink);background:none;border:0;outline:0;font:12px/1.4 ui-monospace,monospace}.run{border:0;border-radius:3px;padding:9px 15px;background:var(--lime);color:#0b0f14;font-weight:700;cursor:pointer;transition:filter .2s}.run:hover{filter:brightness(1.08)}select{color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:4px;padding:9px 11px;outline:0}
    main{min-height:0;display:grid;grid-template-columns:minmax(480px,1.18fr) minmax(380px,.82fr);gap:0;position:relative;z-index:2}.panel{position:relative;min-height:0;overflow:hidden;border:0;border-radius:0;background:transparent;box-shadow:none}.molecule-panel{display:grid;place-items:center;border-right:1px solid var(--line)}.panel-label{position:absolute;left:4px;top:24px;z-index:2;color:var(--muted);font:9px/1 ui-monospace,monospace;text-transform:uppercase;letter-spacing:.18em}.counter{position:absolute;right:24px;top:20px;color:var(--muted);font:11px ui-monospace,monospace;z-index:2}.counter b{color:var(--lime);font-size:16px;font-weight:500}
    #molecule{width:94%;height:84%;display:grid;place-items:center;transition:opacity .35s,transform .6s cubic-bezier(.2,.8,.2,1)}#molecule.loading{opacity:.2;transform:scale(.97)}#molecule svg{width:100%;height:100%;overflow:visible}#molecule svg path,#molecule svg ellipse{transition:stroke .65s,fill .65s,opacity .65s,stroke-width .65s,filter .65s}#molecule svg .oc-dim{opacity:.14!important}#molecule svg .oc-active{stroke:var(--fragment-color,var(--stage-color))!important;opacity:1!important;stroke-width:4px!important;filter:drop-shadow(0 0 3px var(--fragment-color,var(--stage-color)))}.locant-layer{position:absolute;inset:0;pointer-events:none}.locant{position:absolute;width:23px;height:23px;display:grid;place-items:center;border:1px solid var(--lime);border-radius:50%;color:var(--lime);background:#0b0f14;font:650 10px ui-monospace,monospace;box-shadow:0 0 0 3px rgba(244,211,69,.08);animation:pop .35s both}@keyframes pop{from{opacity:0;transform:translate(-50%,-50%) scale(.65)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}.scan{position:absolute;height:1px;left:9%;right:9%;top:50%;opacity:0;background:linear-gradient(90deg,transparent,var(--stage-color),transparent)}.scanning .scan{animation:scan 1.8s ease-in-out infinite}@keyframes scan{0%{opacity:0;top:18%}18%,82%{opacity:.55}100%{opacity:0;top:82%}}
    .story{padding:clamp(36px,4.5vw,72px);display:flex;flex-direction:column;justify-content:center}.eyebrow{color:var(--stage-color);font:600 10px/1 ui-monospace,monospace;letter-spacing:.16em;text-transform:uppercase;transition:color .4s}#stage-title{max-width:600px;margin:22px 0 18px;font:400 clamp(36px,3.4vw,58px)/1.08 Georgia,"Times New Roman",serif;letter-spacing:-.025em;text-wrap:balance}#stage-copy{margin:0;max-width:530px;min-height:58px;color:var(--muted);font-size:clamp(14px,1.1vw,17px);line-height:1.65}.explain-in #stage-title{animation:idea-in .5s ease-out both}.explain-in #stage-copy{animation:idea-in .5s .07s ease-out both}@keyframes idea-in{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}.evidence{min-height:118px;margin-top:30px;display:grid;align-content:start;gap:9px}.chip{opacity:0;transform:translateX(-7px);animation:chip-in .4s forwards;padding:2px 0 2px 13px!important;border:0!important;border-left:2px solid currentColor!important;border-radius:0!important;background:transparent!important;color:var(--ink);font:12px/1.35 ui-monospace,monospace}.chip.accent{color:var(--stage-color)}@keyframes chip-in{to{opacity:1;transform:none}}.result-name{margin-top:28px;padding-top:22px;border-top:1px solid var(--line);color:var(--muted);font:9px/1 ui-monospace,monospace;text-transform:uppercase;letter-spacing:.17em}#result{display:block;margin-top:12px;color:var(--ink);font:400 clamp(21px,2vw,32px)/1.2 Georgia,"Times New Roman",serif;letter-spacing:0;text-transform:none;word-break:break-word}
    footer{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:24px;position:relative;z-index:5;padding-top:16px;border-top:1px solid var(--line)}.transport{display:flex;gap:7px}.icon-btn{width:34px;height:34px;display:grid;place-items:center;border-radius:3px;border:1px solid var(--line);background:transparent;cursor:pointer;transition:border .2s,color .2s}.icon-btn:hover{border-color:var(--lime);color:var(--lime)}.timeline{display:flex;align-items:center;gap:10px}.step{flex:1;height:20px;padding:0;border:0;background:transparent;cursor:pointer;position:relative}.step:before{content:"";position:absolute;left:0;right:0;top:9px;height:1px;background:rgba(238,234,224,.15);transition:background .35s,height .35s}.step.done:before,.step.active:before{background:var(--stage-color)}.step.active:before{height:3px;top:8px;box-shadow:none}.options{display:flex;align-items:center;gap:9px;color:var(--muted);font:10px ui-monospace,monospace}.options button{border:0;color:var(--muted);background:none;cursor:pointer;padding:8px}.options button.on{color:var(--lime)}.error{color:var(--danger)!important}.record-mode .app{padding:30px 44px 24px}.record-mode header .input-bar,.record-mode footer .options{opacity:0;pointer-events:none}.record-mode .panel{border-color:var(--line)}
    @media(max-width:900px){body{overflow:auto}.app{height:auto;min-height:100vh;padding:18px}header{align-items:flex-start}.brand small{display:none}.input-bar{min-width:0;flex:1}select{display:none}main{grid-template-columns:1fr;grid-template-rows:52vh auto}.story{min-height:430px}footer{grid-template-columns:auto 1fr}.options{display:none}}
  </style>
</head>
<body><div class="app">
  <header><div class="brand"><strong>OpenClatura</strong><small>Explainable nomenclature</small></div><div class="input-bar"><select id="presets" aria-label="Example molecule"><option value="CC(=O)Oc1ccccc1C(=O)O">Aspirin</option><option value="CCO">Ethanol</option><option value="CC(C)Cc1ccc(cc1)[C@@H](C)C(=O)O">Ibuprofen</option><option value="CC(=O)Nc1ccc(O)cc1">Paracetamol</option></select><div class="smiles-wrap"><label for="smiles">SMILES</label><input id="smiles" value="CC(=O)Oc1ccccc1C(=O)O" spellcheck="false"><button class="run" id="run">Generate</button></div></div></header>
  <main><section class="panel molecule-panel" id="molecule-panel"><span class="panel-label">Molecular graph</span><span class="counter"><b id="stage-num">01</b> / 07</span><div id="molecule" class="loading"></div><div class="locant-layer" id="locants"></div><div class="scan"></div></section><section class="panel story"><span class="eyebrow" id="eyebrow">01 — Structure input</span><h1 id="stage-title">From structure<br>to language.</h1><p id="stage-copy">A molecular graph enters a deterministic, rule-driven naming pipeline.</p><div class="evidence" id="evidence"></div><div class="result-name">Generated name <strong id="result">—</strong></div></section></main>
  <footer><div class="transport"><button class="icon-btn" id="restart" title="Restart">↺</button><button class="icon-btn" id="play" title="Play / pause">▶</button></div><nav class="timeline" id="timeline" aria-label="Animation stages"></nav><div class="options"><button id="loop" class="on">LOOP</button><button id="speed">1.0×</button><button id="record" title="Hide controls for recording">RECORD MODE</button><button id="full" title="Fullscreen">⛶</button></div></footer>
</div><script>
const $=s=>document.querySelector(s);const state={data:null,stages:[],index:0,playing:false,loop:true,speed:1,timer:null};const colors=['#58c4dd','#58c4dd','#ff862f','#f4d345','#9a72ac','#58c4dd','#f4d345'];const stageMeta=[['Structure input','Begin with the<br>molecular graph.','The SMILES string specifies atoms, bonds, branches, and ring closures.'],['Graph perception','First, see the<br>topology.','The structure becomes a graph whose atoms and bonds can be reasoned about.'],['Principal group','Which group has<br>priority?','Characteristic groups are identified, then compared by nomenclature seniority.'],['Parent selection','Now choose the<br>parent skeleton.','Candidate chains and rings are compared by principal-group coverage and structural seniority.'],['Numbering','Which direction gives<br>the lower locants?','The chosen parent is oriented to minimize the principal-group and substituent positions.'],['Name assembly','Build the name<br>from its parts.','Each colored region contributes a corresponding term to the systematic name.'],['Result','The graph becomes<br>a name.','The assembled terms resolve into the final systematic name.']];
function segment(kind){return(state.data?.trace_segments||[]).find(s=>kind==='parent'?s.key==='parent':String(s.key).startsWith(kind))}function parentDecision(phase){return(segment('parent')?.decisions||[]).find(d=>d.phase===phase)}function unique(items){return[...new Set(items.filter(x=>x!==undefined&&x!==null))]}
function numberingView(numbering,principal,subs){const component=state.data.substituent_tree?.[0]||{},principalTerm=principal?.display_terms?.[0]||principal?.label||'principal group',principalLocants=component.principal_group?.locants||[],subNodes=component.substituents||[],ordered=unique(Object.values(numbering?.data?.atom_to_locant||{})).sort((a,b)=>String(a).localeCompare(String(b),undefined,{numeric:true})),chips=[];if(principalLocants.length)chips.push(`${principalTerm} → locant ${principalLocants.join(', ')}`);subNodes.forEach((node,i)=>{if(node.locants?.length)chips.push(`${subs[i]?.display_terms?.[0]||node.name.replace(/[()]/g,'')} → locant ${node.locants.join(', ')}`)});if(ordered.length)chips.push(`parent order · ${ordered.join(' → ')}`);const firstSub=subNodes.findIndex(node=>node.locants?.length);let copy='The parent is oriented to give the senior features the lowest possible sequence of locants.';if(principalLocants.length&&firstSub>=0){const subTerm=subs[firstSub]?.display_terms?.[0]||subNodes[firstSub].name.replace(/[()]/g,''),subLocant=subNodes[firstSub].locants[0];copy=`The ${principalTerm} attachment fixes locant ${principalLocants[0]}. Numbering proceeds toward ${subTerm}, placing it at ${subLocant} rather than at the higher position.`}return{chips:chips.length?chips:['implicit locant 1'],copy}}
function createStages(){const traces=state.data.trace_segments||[],principal=traces.find(s=>String(s.key).startsWith('principal:')),parent=segment('parent'),numbering=parentDecision('numbering'),subs=traces.filter(s=>String(s.key).startsWith('substituent:')),allAtoms=unique(traces.flatMap(s=>s.atoms||[])),allBonds=unique(traces.flatMap(s=>s.bonds||[])),rules=state.data.rules_hit||[],parentName=parent?.display_terms?.[0]||parent?.name_terms?.[0],numberingInfo=numberingView(numbering,principal,subs),assemblyGroups=[...(parent?[{color:'#58c4dd',atoms:parent.atoms||[],bonds:parent.bonds||[]}]:[]),...subs.map((s,i)=>({color:['#9a72ac','#fc6255','#83c167'][i%3],atoms:s.atoms||[],bonds:s.bonds||[]})),...(principal?[{color:'#ff862f',atoms:principal.atoms||[],bonds:principal.bonds||[]}]:[])],assemblyChips=[...(parentName?[`parent · ${parentName}`]:[]),...subs.map(s=>`substituent · ${s.display_terms?.[0]||s.label.replace(' substituent','')}`),...(principal?[`principal group · ${principal.display_terms?.[0]||principal.label}`]:[])],assemblyColors=[...(parentName?['#58c4dd']:[]),...subs.map((s,i)=>['#9a72ac','#fc6255','#83c167'][i%3]),...(principal?['#ff862f']:[])];state.stages=[{chips:[$('#smiles').value],atoms:[],bonds:[]},{chips:[`${allAtoms.length||'?'} traced atoms`,`${allBonds.length||'?'} traced bonds`],atoms:allAtoms,bonds:allBonds,scan:true},{chips:principal?[principal.label,...unique(principal.display_terms||principal.name_terms||[]).slice(0,1)]:['No suffix-bearing group'],atoms:principal?.atoms||[],bonds:principal?.bonds||[]},{chips:parent?unique([parent.label,parentName]):['parent skeleton'],atoms:parent?.atoms||[],bonds:parent?.bonds||[]},{chips:numberingInfo.chips,copy:numberingInfo.copy,atoms:parent?.atoms||[],bonds:parent?.bonds||[],locants:numbering?.data?.atom_to_locant||{}},{chips:assemblyChips,chipColors:assemblyColors,atoms:allAtoms,bonds:allBonds,groups:assemblyGroups},{chips:['nomenclature complete',`${rules.length} cited Blue Book rules`],atoms:allAtoms,bonds:allBonds}]}
function setHighlights(stage){const svg=$('#molecule svg');if(!svg)return;svg.querySelectorAll('.oc-active,.oc-dim').forEach(el=>{el.classList.remove('oc-active','oc-dim');el.style.removeProperty('--fragment-color')});if(stage.atoms.length||stage.bonds.length)svg.querySelectorAll('path,ellipse,text').forEach(el=>el.classList.add('oc-dim'));const activate=(selector,color)=>svg.querySelectorAll(selector).forEach(el=>{el.classList.remove('oc-dim');el.classList.add('oc-active');if(color)el.style.setProperty('--fragment-color',color)}),groups=stage.groups||[{atoms:stage.atoms,bonds:stage.bonds,color:null}];groups.forEach(group=>group.atoms.forEach(id=>activate(`.atom-${id}`,group.color)));groups.forEach(group=>group.bonds.forEach(id=>activate(`.bond-${id-1}`,group.color)))}
function drawLocants(map={}){const layer=$('#locants');layer.innerHTML='';const panelRect=$('#molecule-panel').getBoundingClientRect(),svgRect=$('#molecule svg')?.getBoundingClientRect();if(!svgRect)return;Object.entries(map).forEach(([atomId,locant],i)=>{const point=state.data.atom_positions?.[atomId];if(!point)return;const x=svgRect.left-panelRect.left+point.x*svgRect.width,y=svgRect.top-panelRect.top+point.y*svgRect.height,dot=document.createElement('span');dot.className='locant';dot.textContent=locant;dot.style.cssText=`left:${x+18}px;top:${y-18}px;animation-delay:${i*.08}s`;layer.append(dot)})}
function renderStage(index){clearTimeout(state.timer);state.index=Math.max(0,Math.min(6,index));const meta=stageMeta[state.index],stage=state.stages[state.index],story=$('.story');document.documentElement.style.setProperty('--stage-color',colors[state.index]);$('#stage-num').textContent=String(state.index+1).padStart(2,'0');$('#eyebrow').textContent=`${String(state.index+1).padStart(2,'0')} — ${meta[0]}`;$('#stage-title').innerHTML=meta[1];$('#stage-copy').textContent=stage.copy||meta[2];$('#result').textContent=state.index===6?state.data.name:'—';const evidence=$('#evidence');evidence.innerHTML='';(stage.chips.length?stage.chips:['rule pipeline active']).forEach((text,i)=>{const chip=document.createElement('span'),chipColor=stage.chipColors?.[i];chip.className='chip'+(i===0?' accent':'');chip.textContent=text;chip.style.animationDelay=`${i*.09}s`;if(chipColor)chip.style.color=chipColor;evidence.append(chip)});story.classList.remove('explain-in');void story.offsetWidth;story.classList.add('explain-in');$('#molecule-panel').classList.toggle('scanning',!!stage.scan);setHighlights(stage);drawLocants(stage.locants);[...$('#timeline').children].forEach((el,i)=>el.className='step '+(i<state.index?'done':i===state.index?'active':''));if(state.playing)schedule()}
function schedule(){clearTimeout(state.timer);state.timer=setTimeout(()=>{if(state.index<6)renderStage(state.index+1);else if(state.loop)renderStage(0);else togglePlay(false)},2500/state.speed)}function togglePlay(force){state.playing=force??!state.playing;$('#play').textContent=state.playing?'❚❚':'▶';if(state.playing)schedule();else clearTimeout(state.timer)}
async function analyze(){togglePlay(false);$('#molecule').classList.add('loading');$('#result').textContent='Analyzing…';$('#result').classList.remove('error');try{const res=await fetch('/showcase/analyze',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({smiles:$('#smiles').value.trim()})});state.data=await res.json();if(!res.ok||!state.data.ok)throw new Error(state.data.error||'This structure could not be named.');$('#molecule').innerHTML=state.data.molecule_svg;createStages();renderStage(0);requestAnimationFrame(()=>$('#molecule').classList.remove('loading'));togglePlay(true)}catch(err){$('#molecule').classList.remove('loading');$('#result').textContent=err.message;$('#result').classList.add('error');$('#stage-title').innerHTML='Naming paused.';$('#stage-copy').textContent='Check the SMILES syntax or try one of the curated examples.'}}
for(let i=0;i<7;i++){const b=document.createElement('button');b.className='step';b.title=stageMeta[i][0];b.onclick=()=>{togglePlay(false);renderStage(i)};$('#timeline').append(b)}$('#run').onclick=analyze;$('#smiles').onkeydown=e=>{if(e.key==='Enter')analyze()};$('#presets').onchange=e=>{$('#smiles').value=e.target.value;analyze()};$('#play').onclick=()=>togglePlay();$('#restart').onclick=()=>{togglePlay(true);renderStage(0)};$('#loop').onclick=()=>{state.loop=!state.loop;$('#loop').classList.toggle('on',state.loop)};$('#speed').onclick=()=>{state.speed=state.speed===1?1.5:state.speed===1.5?.65:1;$('#speed').textContent=`${state.speed}×`;if(state.playing)schedule()};$('#record').onclick=()=>document.body.classList.toggle('record-mode');$('#full').onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();window.addEventListener('resize',()=>{if(state.stages.length)drawLocants(state.stages[state.index].locants)});analyze();
</script></body></html>
